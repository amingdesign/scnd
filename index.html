<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>vClock Professional</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="light-theme">

    <header class="navbar">
        <div class="nav-container">
            <div class="logo">vClock</div>
            <div class="nav-links">
                <span>Holidays</span>
                <span>Tools ▾</span>
                <span class="icon-btn" onclick="toggleTheme()" id="themeIcon"><i class="fa-regular fa-moon"></i></span>
                <span class="icon-btn"><i class="fa-solid fa-gear"></i></span>
            </div>
        </div>
    </header>

    <div class="main-layout">
        <aside class="sidebar">
            <div class="menu-item active"><i class="fa-regular fa-clock"></i><span>Alarm Clock</span></div>
            <div class="menu-item"><i class="fa-solid fa-hourglass-half"></i><span>Timer</span></div>
            <div class="menu-item"><i class="fa-solid fa-stopwatch"></i><span>Stopwatch</span></div>
            <div class="menu-item"><i class="fa-regular fa-calendar"></i><span>Time</span></div>
        </aside>

        <main class="content">
            <section class="clock-card">
                <div class="card-tools">
                    <i class="fa-solid fa-link"></i> 
                    <i class="fa-solid fa-minus"></i> 
                    <i class="fa-solid fa-plus"></i> 
                    <i class="fa-solid fa-expand"></i>
                </div>
                <h1 id="time">00:00:00<span>PM</span></h1>
                <p id="date">LOADING...</p>
                <button class="btn-green" onclick="toggleModal(true)">Set Alarm</button>

                <div id="activeAlarmContainer" class="active-alarm-box" style="display: none;">
                    <div class="divider"></div>
                    <h3 id="displayAlarmTitle">Alarm</h3>
                    <div class="alarm-display-center">
                        <i class="fa-regular fa-bell"></i>
                        <span id="displayAlarmTime">00:00 PM</span>
                    </div>
                    <div class="countdown-display">
                        <i class="fa-solid fa-hourglass-end"></i>
                        <span id="displayCountdown">00:00:00</span>
                    </div>
                    <button class="btn-stop" onclick="stopAlarm()">Stop Alarm</button>
                </div>
            </section>

            <section class="quick-alarm-section">
                <h2 class="section-title">Set the alarm for the specified time</h2>
                <div id="quickButtons" class="alarm-grid-layout">
                    </div>
            </section>
        </main>
    </div>

    <div id="alarmModal" class="modal-overlay">
        <div class="modal-box">
            <div class="modal-header">
                <span>Edit Alarm</span>
                <span class="close-btn" onclick="toggleModal(false)">&times;</span>
            </div>
            <div class="modal-body">
                <div class="row">
                    <div class="col">
                        <label>Hours</label>
                        <select id="h-select"></select>
                    </div>
                    <div class="col">
                        <label>Minutes</label>
                        <select id="m-select"></select>
                    </div>
                </div>
                <div class="row-full">
                    <label>Sound</label>
                    <select id="sound-select"><option>Bells</option></select>
                </div>
                <div class="row-full">
                    <label>Title</label>
                    <input type="text" id="alarm-title" value="Alarm">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-outline">Test</button>
                <div class="footer-btns">
                    <button class="btn-outline" onclick="toggleModal(false)">Cancel</button>
                    <button class="btn-green" onclick="saveAlarm()">Start</button>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
