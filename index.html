<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jam Digital Saya</title>
    <style>
        body { background: #1a1a1a; color: #00ff00; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: 'Courier New', monospace; margin: 0; }
        #clock { font-size: 80px; border: 5px solid #333; padding: 20px; border-radius: 15px; background: #000; box-shadow: 0 0 20px rgba(0,255,0,0.2); }
    </style>
</head>
<body>

    <div id="clock">00:00:00</div>

    <script>
        function updateClock() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('id-ID');
            document.getElementById('clock').textContent = timeString;
        }
        setInterval(updateClock, 1000);
        updateClock(); // jalankan langsung
    </script>
</body>
</html>
